# Mix v3 — the robust-run dataset (d384 model, GO from the 2026-07-04 pilot gate).
#
# Fixes the two shortfalls mix-v2 exposed:
#   1. Quora is EXHAUSTED at ~103k anchors — no weight can pull more. v3 mines
#      the `positive` column of the pair datasets as additional sources
#      (verified schemas: quora/all-nli = anchor+positive, stackexchange =
#      title1+title2) and adds StackExchange duplicate titles.
#   2. Source shortfalls are not backfilled, so v2 landed at 774k not 1M.
#      v3 over-requests (1.15M) so the post-dedup total LANDS near 1M.
#
# Expected effective mix: ~50% question/search text, ~50% paraphrase+statement.
# VERIFY the sanity dashboard before training: total ≥ ~1.0M and no source
# wildly below target. Quora at ~0.09 of 1.15M ≈ its full capacity by design.

wandb_project: ternlight-micro
wandb_group: mix-v3-robust
wandb_tags:
  - tier:small
  - phase:robust-d384-mixv3
  - dataset-mix:msmarco+quora2col+allnli2col+stackex+gooaq

data:
  sources:
    - name: ms_marco
      hf_dataset: microsoft/ms_marco   # namespaced — newer `datasets` rejects bare "ms_marco"
      hf_config: v2.1
      split: train
      text_field: query
      weight: 0.36

    - name: st-gooaq
      hf_dataset: sentence-transformers/gooaq
      split: train
      text_field: question
      weight: 0.15

    # Quora paraphrases — BOTH columns (anchor ~103k is the source's full capacity)
    - name: st-quora
      hf_dataset: sentence-transformers/quora-duplicates
      hf_config: pair
      split: train
      text_field: anchor
      weight: 0.09
    - name: st-quora-pos
      hf_dataset: sentence-transformers/quora-duplicates
      hf_config: pair
      split: train
      text_field: positive
      weight: 0.09

    # AllNLI statements — both columns
    - name: st-allnli
      hf_dataset: sentence-transformers/all-nli
      hf_config: pair
      split: train
      text_field: anchor
      weight: 0.08
    - name: st-allnli-pos
      hf_dataset: sentence-transformers/all-nli
      hf_config: pair
      split: train
      text_field: positive
      weight: 0.08

    # StackExchange duplicate-question titles — developer-domain paraphrases
    - name: st-stackex
      hf_dataset: sentence-transformers/stackexchange-duplicates
      hf_config: title-title-pair
      split: train
      text_field: title1
      weight: 0.15

  total_samples: 1_150_000     # over-request: ~7% dedup shave lands us near 1M
  max_len: 128
  teacher_id: sentence-transformers/all-MiniLM-L6-v2
  teacher_revision: main
  tokenizer_id: bert-base-uncased
  teacher_batch_size: 512
  seed: 42
  val_ratio: 0.05
  test_ratio: 0.05
  cache_dir: cache
  cache_name: mix_v3_1M
