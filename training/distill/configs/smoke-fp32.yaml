# Phase 2 smoke — validates the training pipeline end-to-end in ~30s.
# Trains 2 epochs on the existing smoke_1k cache. Use this before kicking off
# the real micro-fp32.yaml run to catch wiring bugs cheaply.

wandb_project: ternlight-micro
wandb_group: smoke
wandb_tags:
  - tier:micro
  - phase:smoke
  - mode:fp32-baseline

train:
  vocab_size: 30522
  d_model: 256
  n_layers: 2
  n_heads: 4
  ffn_dim: 1024
  output_dim: 384
  dropout: 0.1

  cache_dir: cache
  cache_name: smoke_1k

  epochs: 2
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 0.01
  lr_warmup_ratio: 0.10
  grad_clip: 1.0

  enable_qat: false
  qat_warmup_epochs: 0
  contrastive_w: 0.0

  run_name: smoke-fp32
  runs_dir: runs
  save_every: 2
